# Unitree Go2 velocity-tracking environment. Actions are joint-position
# offsets around a nominal standing pose, so smaller exploration noise and
# stronger smoothing keep the robot upright longer.

task: Isaac-Velocity-Flat-Unitree-Go2-v0
num_envs: 128
num_steps: 50000
headless: true
seed: 42
device: cuda:0

exploration:
  policy: latent
  action_std: 0.3
  action_smoothing: 0.5

segmentation:
  segment_horizon: 40     # ~0.8 s at 50 Hz control
  segment_stride: 20
  min_segment_length: 20

clustering:
  method: kmeans
  num_skills: 10
  random_seed: 42

composition:
  target_threshold: 0.5
  max_high_level_steps: 25
  lambda_energy: 0.05
  lambda_yaw: 0.1
