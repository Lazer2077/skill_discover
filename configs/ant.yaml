# Isaac Ant (MuJoCo-style quadruped with torque-like actions).

task: Isaac-Ant-v0
num_envs: 256
num_steps: 50000
headless: true
seed: 42
device: cuda:0

exploration:
  policy: latent          # latent-conditioned exploration gives more diverse gaits
  action_std: 0.5
  action_smoothing: 0.3

segmentation:
  segment_horizon: 32
  segment_stride: 16
  min_segment_length: 16

clustering:
  method: kmeans
  num_skills: 8
  random_seed: 42

composition:
  target_threshold: 0.5
  max_high_level_steps: 20
  lambda_energy: 0.05
  lambda_yaw: 0.1
