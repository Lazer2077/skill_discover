# Default pipeline configuration. Task-specific files (ant.yaml, go2.yaml)
# override individual keys; CLI flags override both.

task: Isaac-Ant-v0
num_envs: 256
num_steps: 50000
headless: true
seed: 42
device: cuda:0

exploration:
  policy: random          # random | latent
  action_std: 0.5
  action_smoothing: 0.2
  latent_dim: 8           # latent policy only
  latent_horizon: 64      # latent policy only

segmentation:
  segment_horizon: 32
  segment_stride: 16
  min_segment_length: 16

descriptor:
  normalize: true         # z-score before clustering (done inside SkillClusterer)

clustering:
  method: kmeans          # kmeans | gmm | hdbscan
  num_skills: 8
  random_seed: 42

composition:
  target_threshold: 0.5
  max_high_level_steps: 20
  lambda_energy: 0.05
  lambda_yaw: 0.1

online_v2:
  online_iterations: 5
  steps_per_iter: 8192
  max_skills: 16
  clustering_method: weighted_kmeans
  novelty_threshold: 3.0
  replace_margin: 0.05
  max_archive_size: 5000
  min_stability_for_archive: 0.2

discriminator:
  hidden_dim: 128
  epochs: 5
  batch_size: 256
  lr: 0.001
  threshold: 0.55
  hybrid_alpha: 0.5
  rbf_temperature: 1.5
  negative_ratio: 2
  lambda_discriminator: 1.0
  lambda_reliability: 0.25
  lambda_no_progress: 1.0
  min_predicted_progress: 0.02
